# ===================================================================
# CONFIGURACIï¿½N GENERAL
# ===================================================================
spring.application.name=hardpc-backend-api

# ===================================================================
# 1. ENTORNO DE PRUEBAS (H2 IN-MEMORY) - ACTIVO
# ===================================================================
# Base de datos en memoria (volï¿½til). Ideal para pruebas unitarias y desarrollo rï¿½pido.
spring.datasource.url=jdbc:h2:mem:hardpc_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar acceso a la consola web (Ruta: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# 2. ENTORNO DE DESARROLLO/PRODUCCIï¿½N (MYSQL) - INACTIVO
# ===================================================================
# Para usar MySQL: Comentar el bloque 1 (H2) y descomentar este bloque.
# Asegurarse de actualizar las credenciales antes de levantar el servidor.
#
# spring.datasource.url=jdbc:mysql://localhost:3306/hardpc_db?serverTimezone=America/Lima
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# 3. CONFIGURACIï¿½N DE HIBERNATE / JPA (GLOBAL)
# ===================================================================
# 'update': Actualiza el esquema de la BD sin eliminar datos existentes.
spring.jpa.hibernate.ddl-auto=update

# Mostrar y dar formato a las consultas SQL en la consola (ï¿½til para depuraciï¿½n)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. INICIALIZACIÓN DE DATOS (SEEDING)
# ===================================================================
# Garantiza que Hibernate genere primero el esquema de la base de datos (DDL)
# antes de ejecutar los scripts de inserción de datos como data.sql (DML).
spring.jpa.defer-datasource-initialization=true