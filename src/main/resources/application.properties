# ===================================================================
# CONFIGURACIÓN GENERAL
# ===================================================================
spring.application.name=hardpc-backend-api

# ===================================================================
# 1. ENTORNO DE PRUEBAS (H2 IN-MEMORY) - INACTIVO
# ===================================================================
# Base de datos en memoria (volátil).
# spring.datasource.url=jdbc:h2:mem:hardpc_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Habilitar acceso a la consola web (Ruta: http://localhost:8080/h2-console)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ===================================================================
# 2. ENTORNO DE DESARROLLO/PRODUCCIÓN (MYSQL) - ACTIVO
# ===================================================================
# Base de datos con MySQL - Configuración básica.
spring.datasource.url=jdbc:mysql://localhost:3306/hardpc_db?serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Propiedad que ayuda a Hibernate con el dialecto MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# 3. CONFIGURACIÓN DE HIBERNATE / JPA (GLOBAL)
# ===================================================================
# 'update': Actualiza el esquema de la BD sin eliminar datos existentes.
spring.jpa.hibernate.ddl-auto=update

# Mostrar y dar formato a las consultas SQL en la consola (útil para depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. INICIALIZACIÓN DE DATOS (SEEDING)
# ===================================================================
# Garantiza que Hibernate genere primero el esquema de la base de datos (DDL)
# antes de ejecutar los scripts de inserción de datos como data.sql (DML).
# spring.jpa.defer-datasource-initialization=true

# ===================================================================
# 5. GESTIÓN DE ERRORES Y RUTAS WEB (API REST)
# ===================================================================
# Habilitar el lanzamiento de excepción cuando no se encuentra un handler/endpoint (404)
spring.mvc.throw-exception-if-no-handler-found=true

# Deshabilitar el mapeo de recursos estáticos por defecto (necesario para que la propiedad anterior funcione estrictamente en APIs REST)
spring.web.resources.add-mappings=false